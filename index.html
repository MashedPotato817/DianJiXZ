<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DianJiXZ · 电机小车</title>
<style>
:root {
  --bg: #060B14;
  --surface: #0D1525;
  --border: #1A2A44;
  --cyan: #00C2FF;
  --green: #00E599;
  --text: #C4CFE0;
  --text-dim: #6B7FA0;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  --font-body: 'Noto Sans SC', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}
main { max-width: 520px; width: 100% }
h1 {
  font-size: 2.5rem; font-weight: 800; color: #E8EEF6;
  margin-bottom: 0.25rem; letter-spacing: -0.02em;
}
h1 span { color: var(--cyan) }
.subtitle { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 3rem }
.cards { display: flex; flex-direction: column; gap: 1rem }
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s, background 0.2s;
}
.card:hover { border-color: var(--cyan); background: #111C30 }
.card h2 { font-size: 1.15rem; color: #E8EEF6; margin-bottom: 0.4rem }
.card p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5 }
.card .tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.65rem; letter-spacing: 0.1em;
  padding: 0.15rem 0.6rem; border-radius: 3px;
  margin-top: 0.75rem;
}
.tag-cyan { background: rgba(0,194,255,0.12); color: var(--cyan) }
.tag-green { background: rgba(0,229,153,0.12); color: var(--green) }
footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-size: 0.7rem; color: var(--text-dim);
  display: flex; justify-content: space-between;
}
.back {
  margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim);
}
.back a { color: var(--cyan); text-decoration: none }
@media (max-width: 500px) { h1 { font-size: 1.8rem } }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<main>
  <h1>DianJi<span>XZ</span></h1>
  <p class="subtitle">NUEDC 控制类备赛 · 差速电机小车</p>

  <div class="cards">
    <a href="nuedc-summary.html" class="card">
      <h2>电赛控制类题目总结 2019–2025</h2>
      <p>历年题目分析、评分结构、备赛路线、常见失分点</p>
      <span class="tag tag-cyan">分析报告</span>
    </a>

    <a href="docs_learn/" class="card">
      <h2>算法扫盲笔记</h2>
      <p>PID、PWM、灰度巡线、差速运动学、DMA 等核心概念 Q&A</p>
      <span class="tag tag-green">学习笔记</span>
    </a>
  </div>

  <footer>
    <span>MashedPotato817</span>
    <span>DianJiXZ</span>
  </footer>
</main>
</body>
</html>
